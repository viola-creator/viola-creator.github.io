<!-- Floating "Next session" booking card (desktop only).
     The page-specific JS populates rail-next-date / rail-next-time
     from the workshop's session data on load. -->
<aside class="float-book" id="float-book" aria-label="Reserve next session">
  <button class="close" id="float-close" aria-label="Dismiss">×</button>
  <div class="label"><span class="lang-en">Next session</span><span class="lang-jp">次回開催</span></div>
  <div class="when" id="rail-next-date">—</div>
  <div class="meta"><span id="rail-next-time">—</span> · <strong id="rail-price">—</strong></div>
  <button class="float-cta"><span class="lang-en">Book now</span><span class="lang-jp">ご予約</span></button>
  <a class="float-link" href="#sessions" onclick="document.getElementById('sessions').scrollIntoView({behavior:'smooth'});return false;"><span class="lang-en">See all dates ↓</span><span class="lang-jp">日程をすべて見る ↓</span></a>
</aside>
